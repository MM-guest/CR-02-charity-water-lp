<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>charity: water</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header: this is the top navigation bar -->
  <header class="site-header">
    <div class="logo">
      <img class="logo-image" src="img/cw_logo-2.png" alt="charity: water logo">
    </div>

    <nav class="main-nav" aria-label="Main navigation">
      <a href="#">Home</a>
      <a href="#">About Us</a>
      <a href="#">Donate</a>
      <a href="#">Login</a>
    </nav>
  </header>

  <!-- Hero section: this is the big welcome area with text and an image -->
  <section class="hero">
    <div class="hero-text">
      <h1>Give $10. Change a life. See exactly where it goes.</h1>
      <p>Give in seconds, and we'll prove your impact with photos and GPS coordinates of the project you funded.</p>
      <a class="button" href="https://www.charitywater.org/donate">DONATE NOW</a>
    </div>

    <div class="hero-image">
      <img src="img/landing%20page%20photo.jpg" alt="A community water project scene">
    </div>
  </section>

  <!-- Footer: small information and a link to the charity website -->
  <footer class="site-footer">
    <p>© charity: water</p>
    <p><a href="https://www.charitywater.org">charitywater.org</a></p>
  </footer>
</body>
</html>
